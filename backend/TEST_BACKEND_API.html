<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayFlow Backend API - Test Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .status {
            display: inline-block;
            padding: 8px 16px;
            background: #4caf50;
            border-radius: 20px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .qr-section {
            text-align: center;
            padding: 20px;
        }
        #qrcode {
            margin: 20px auto;
            display: inline-block;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }
        .url-display {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        .test-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        .input-group input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .response {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        .response.show {
            display: block;
        }
        .response pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 12px;
        }
        .success {
            color: #4caf50;
            font-weight: bold;
        }
        .error {
            color: #f44336;
            font-weight: bold;
        }
        .endpoint-list {
            list-style: none;
            padding: 0;
        }
        .endpoint-list li {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
        }
        .method {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-right: 8px;
        }
        .post { background: #4caf50; color: white; }
        .get { background: #2196f3; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 DayFlow Backend API</h1>
            <div class="status">● SERVER RUNNING</div>
        </div>

        <div class="grid">
            <!-- QR Code Section -->
            <div class="card qr-section">
                <h2>📱 Scan to Test on Mobile</h2>
                <p>Scan this QR code to open this page on your phone</p>
                <div id="qrcode"></div>
                <div class="url-display" id="pageUrl"></div>
            </div>

            <!-- API Info -->
            <div class="card">
                <h2>📡 API Endpoints</h2>
                <ul class="endpoint-list">
                    <li>
                        <span class="method get">GET</span>
                        <span>/health</span>
                    </li>
                    <li>
                        <span class="method post">POST</span>
                        <span>/api/auth/register</span>
                    </li>
                    <li>
                        <span class="method post">POST</span>
                        <span>/api/auth/login</span>
                    </li>
                </ul>
                <div style="margin-top: 15px;">
                    <strong>Base URL:</strong>
                    <div class="url-display" id="apiUrl"></div>
                </div>
            </div>
        </div>

        <!-- Registration Test -->
        <div class="card">
            <h2>🔐 Test Registration</h2>
            <form class="test-form" id="registerForm">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" id="regName" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="john@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password (min 8 chars)</label>
                    <input type="password" id="regPassword" placeholder="********" required>
                </div>
                <button type="submit" class="btn">Register User</button>
            </form>
            <div class="response" id="registerResponse"></div>
        </div>

        <!-- Login Test -->
        <div class="card">
            <h2>🔑 Test Login</h2>
            <form class="test-form" id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="john@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="********" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="response" id="loginResponse"></div>
        </div>

        <!-- Health Check -->
        <div class="card">
            <h2>💚 Health Check</h2>
            <button class="btn" onclick="testHealth()">Check Server Health</button>
            <div class="response" id="healthResponse"></div>
        </div>
    </div>

    <script>
        // Configuration
        const LOCAL_IP = '192.168.0.194'; // Your local IP
        const PORT = 3000;
        const API_BASE = `http://${LOCAL_IP}:${PORT}`;
        const PAGE_URL = window.location.href;

        // Display URLs
        document.getElementById('apiUrl').textContent = API_BASE;
        document.getElementById('pageUrl').textContent = PAGE_URL;

        // Generate QR Code
        QRCode.toCanvas(
            document.createElement('canvas'),
            PAGE_URL,
            { width: 200 },
            (error, canvas) => {
                if (error) console.error(error);
                document.getElementById('qrcode').appendChild(canvas);
            }
        );

        // Test Health
        async function testHealth() {
            const response = document.getElementById('healthResponse');
            response.classList.add('show');
            response.innerHTML = '<p>Loading...</p>';
            
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                response.innerHTML = `
                    <p class="success">✅ Status: ${res.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                response.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
            }
        }

        // Registration
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = document.getElementById('registerResponse');
            response.classList.add('show');
            response.innerHTML = '<p>Loading...</p>';

            const data = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };

            try {
                const res = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (res.ok) {
                    response.innerHTML = `
                        <p class="success">✅ Registration Successful! (${res.status})</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                        <p style="margin-top: 10px;"><strong>Token:</strong> ${result.token.substring(0, 50)}...</p>
                    `;
                    // Pre-fill login form
                    document.getElementById('loginEmail').value = data.email;
                    document.getElementById('loginPassword').value = data.password;
                } else {
                    response.innerHTML = `
                        <p class="error">❌ Registration Failed (${res.status})</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                response.innerHTML = `<p class="error">❌ Network Error: ${error.message}</p>`;
            }
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const response = document.getElementById('loginResponse');
            response.classList.add('show');
            response.innerHTML = '<p>Loading...</p>';

            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (res.ok) {
                    response.innerHTML = `
                        <p class="success">✅ Login Successful! (${res.status})</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                        <p style="margin-top: 10px;"><strong>Token:</strong> ${result.token.substring(0, 50)}...</p>
                    `;
                } else {
                    response.innerHTML = `
                        <p class="error">❌ Login Failed (${res.status})</p>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                response.innerHTML = `<p class="error">❌ Network Error: ${error.message}</p>`;
            }
        });

        // Auto-test on load
        window.addEventListener('load', () => {
            setTimeout(testHealth, 500);
        });
    </script>
</body>
</html>
