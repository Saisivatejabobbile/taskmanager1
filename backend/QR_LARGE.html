<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🔲 LARGE QR CODE</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: white;
            font-family: Arial, sans-serif;
        }
        .qr-container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 4em;
            margin: 0 0 20px 0;
            color: #667eea;
        }
        .subtitle {
            font-size: 2em;
            color: #333;
            margin-bottom: 40px;
        }
        #qr {
            margin: 40px auto;
        }
        .url {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            margin: 40px 0;
        }
        .status {
            font-size: 1.5em;
            color: #4caf50;
            font-weight: bold;
            margin-bottom: 20px;
        }
        @media print {
            body {
                background: white;
            }
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <div class="status">● BACKEND RUNNING</div>
        <h1>📱 SCAN HERE</h1>
        <p class="subtitle">DayFlow Backend API</p>
        <div id="qr"></div>
        <div class="url">192.168.0.194:3000</div>
    </div>

    <script>
        const API_URL = 'http://192.168.0.194:3000';
        
        // Generate VERY LARGE QR code
        QRCode.toCanvas(
            document.createElement('canvas'),
            API_URL,
            { 
                width: 600,
                margin: 4,
                color: {
                    dark: '#000000',
                    light: '#ffffff'
                },
                errorCorrectionLevel: 'H'
            },
            (error, canvas) => {
                if (error) {
                    console.error(error);
                } else {
                    document.getElementById('qr').appendChild(canvas);
                }
            }
        );
    </script>
</body>
</html>
